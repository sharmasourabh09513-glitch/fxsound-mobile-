name: Build FxSound Android - VERSION 3 FINAL

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v4 # Using the latest v4 action
      with:
        gradle-version: 8.4

    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon --info --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fxsound-clone-apk-v3
        path: app/build/outputs/apk/debug/app-debug.apk
